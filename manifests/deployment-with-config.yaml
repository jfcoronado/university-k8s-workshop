apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: workshop-app
  labels:
    app: demo-app
  annotations:
    kubernetes.io/change-cause: "Module 7 - Added ConfigMap and Secret injection"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: k8s-workshop-demo:1.0.0
          imagePullPolicy: Never   # Use the locally loaded image - don't try to pull from a registry
          ports:
            - containerPort: 3000
              name: http
          env:
            # ---- Downward API ----------------------------------------------------------------------------------------------
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # ---- From ConfigMap (individual keys) ------------------------------------------------------
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: demo-app-config
                  key: APP_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: demo-app-config
                  key: LOG_LEVEL
            - name: FEATURE_NEW_UI
              valueFrom:
                configMapKeyRef:
                  name: demo-app-config
                  key: FEATURE_NEW_UI
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: demo-app-config
                  key: APP_VERSION
            # ---- From Secret ------------------------------------------------------------------------------------------------
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-app-secret
                  key: DB_PASSWORD
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: demo-app-secret
                  key: API_KEY
          # ---- Mount config file as a volume ------------------------------------------------------------
          volumeMounts:
            - name: config-files
              mountPath: /etc/config
              readOnly: true
            - name: secret-files
              mountPath: /etc/secrets
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: config-files
          configMap:
            name: demo-app-config
        - name: secret-files
          secret:
            secretName: demo-app-secret
