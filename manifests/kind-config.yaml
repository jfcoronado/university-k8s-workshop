kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  # NOT FOR WORKSHOP Uncomment the worker nodes to add 1, 2, or all 3 workers
  # Recommended: 8GB+ RAM free before enabling multiple workers
  # - role: worker
  # - role: worker
  # - role: worker
