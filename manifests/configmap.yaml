apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-config
  namespace: workshop-app
data:
  # ---- Simple key-value pairs (injected as env vars) --------------------------------------------------
  APP_ENV: "workshop"
  APP_VERSION: "1.0.0"
  LOG_LEVEL: "info"
  MAX_CONNECTIONS: "100"
  FEATURE_NEW_UI: "false"   # Change to "true" and re-apply - watch the UI update!

  # ---- Multi-line config files (mounted as files under /etc/config/) --------------------
  app.properties: |
    environment=workshop
    app.version=1.0.0
    log.level=info
    feature.new_ui=false
    max.connections=100

  feature-flags.json: |
    {
      "new_ui": false,
      "dark_mode": false,
      "max_connections": 100
    }
