apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: workshop-app
  labels:
    app: demo-app
  annotations:
    kubernetes.io/change-cause: "Initial deployment - workshop demo app v1.0.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # Zero-downtime updates
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: k8s-workshop-demo:1.0.0
          imagePullPolicy: Never   # Use the locally loaded image - don't try to pull from a registry
          ports:
            - containerPort: 3000
              name: http
          env:
            # ---- Downward API: expose Pod metadata INTO the app --------------------------
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # ---- App config (will be replaced by ConfigMap in Module 7) ----------
            - name: APP_ENV
              value: "workshop"
            - name: APP_VERSION
              value: "1.0.0"
            - name: LOG_LEVEL
              value: "info"
            - name: FEATURE_NEW_UI
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
