apiVersion: v1
kind: Secret
metadata:
  name: demo-app-secret
  namespace: workshop-app
type: Opaque
# stringData: K8s automatically base64-encodes these values
# Use 'data' instead if you want to provide pre-encoded values
stringData:
  DB_PASSWORD: "super-secret-workshop-password"
  API_KEY: "workshop-api-key-12345"
  connection-string: "postgresql://appuser:super-secret-workshop-password@db:5432/workshopdb"

# ---- NOTE ------------------------------------------------------------------------------------------------------------------------------------------
# Secrets are base64 ENCODED, not encrypted.
# For production security, use one of these approaches:
#   - Sealed Secrets (Bitnami): encrypts secrets in git
#   - External Secrets Operator: pulls from AWS SM, GCP SM, Vault
#   - HashiCorp Vault Agent Injector: injects secrets at pod startup
#   - Enable Kubernetes etcd encryption at rest
# ----------------------------------------------------------------------------------------------------------------------------------------------------------
